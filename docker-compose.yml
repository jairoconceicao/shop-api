services:
  shop-api-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shop-api-app
    ports:
      - "5228:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ShopDb=Host=shop-api-db;Port=5432;Database=shopapi;Username=shopapi;Password=shopapi
      - Jwt__Secret=dev-secret-please-change-in-production-1234567890abcdefghij
      - Jwt__Issuer=shop-api
      - Jwt__Audience=shop-api-clients
      - Jwt__ExpiracaoEmHoras=8
      - Cors__AllowedOrigins__0=http://localhost:5173
      - Cors__AllowedOrigins__1=http://127.0.0.1:5173
    depends_on:
      shop-api-db:
        condition: service_healthy

  shop-api-db:
    image: postgres:16-alpine
    container_name: shop-api-db
    environment:
      - POSTGRES_USER=shopapi
      - POSTGRES_PASSWORD=shopapi
      - POSTGRES_DB=shopapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopapi -d shopapi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
