<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shop. — Meus Dados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-dvh">
    <div data-header data-auth="in"></div>

    <main class="container-page py-10 max-w-3xl">
      <div class="flex items-center justify-between gap-4 mb-8">
        <div>
          <p class="eyebrow">Área do Cliente</p>
          <h1 class="section-title mt-1 text-2xl sm:text-3xl">Meus Dados</h1>
        </div>
        <a href="index.html" class="btn-ghost">← Voltar à loja</a>
      </div>

      <!-- Sub-nav da conta -->
      <nav class="flex flex-wrap gap-2 mb-8">
        <a href="dados.html" class="chip-active">Meus dados</a>
        <a href="senha.html" class="chip">Trocar senha</a>
        <a href="pedidos.html" class="chip">Meus pedidos</a>
      </nav>

      <form class="surface-raised p-6 sm:p-8 space-y-8" onsubmit="event.preventDefault();">
        <!-- Identidade -->
        <fieldset class="space-y-5">
          <legend class="font-semibold text-zinc-100">Identificação</legend>
          <div class="grid sm:grid-cols-2 gap-5">
            <div>
              <label class="label" for="nome">Nome completo</label>
              <input id="nome" class="input" value="João Carlos Cliente" />
            </div>
            <div>
              <label class="label" for="email">E-mail</label>
              <input id="email" type="email" class="input" value="joao@email.com" />
            </div>
            <div>
              <label class="label" for="cpf">CPF</label>
              <input id="cpf" class="input" value="123.456.789-00" disabled />
            </div>
            <div>
              <label class="label" for="tel">Telefone</label>
              <input id="tel" class="input" value="(11) 98765-4321" />
            </div>
            <div>
              <label class="label" for="nasc">Data de nascimento</label>
              <input id="nasc" type="date" class="input" value="1992-04-18" />
            </div>
          </div>
        </fieldset>

        <div class="hairline"></div>

        <!-- Endereço principal -->
        <fieldset class="space-y-5">
          <legend class="font-semibold text-zinc-100">Endereço principal</legend>
          <div class="grid sm:grid-cols-6 gap-5">
            <div class="sm:col-span-4">
              <label class="label" for="rua">Logradouro</label>
              <input id="rua" class="input" value="Rua das Acácias, 245" />
            </div>
            <div class="sm:col-span-2">
              <label class="label" for="num">Número</label>
              <input id="num" class="input" value="Apto 72" />
            </div>
            <div class="sm:col-span-2">
              <label class="label" for="cep">CEP</label>
              <input id="cep" class="input" value="01310-100" />
            </div>
            <div class="sm:col-span-3">
              <label class="label" for="bairro">Bairro</label>
              <input id="bairro" class="input" value="Bela Vista" />
            </div>
            <div class="sm:col-span-1">
              <label class="label" for="uf">UF</label>
              <input id="uf" class="input" value="SP" />
            </div>
            <div class="sm:col-span-4">
              <label class="label" for="cidade">Cidade</label>
              <input id="cidade" class="input" value="São Paulo" />
            </div>
          </div>
        </fieldset>

        <!-- Ações -->
        <div class="flex flex-wrap items-center justify-end gap-3 pt-2">
          <button type="reset" class="btn-secondary">Descartar</button>
          <button type="submit" class="btn-primary">Salvar alterações</button>
        </div>
      </form>
    </main>

    <div data-footer></div>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
