<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shop. — Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-dvh">
    <!-- Menu do cliente em estado "deslogado": mostra apenas "Entrar" -->
    <div data-header data-auth="out"></div>

    <main class="container-page py-16">
      <div class="mx-auto max-w-md">
        <div class="surface-raised p-8">
          <div class="text-center">
            <span class="inline-grid place-items-center h-12 w-12 rounded-2xl bg-brand-500 text-ink-950 font-black text-xl">S</span>
            <h1 class="mt-5 text-2xl font-bold text-zinc-50">Entrar na sua conta</h1>
            <p class="mt-2 text-sm text-zinc-500">
              Bem-vindo de volta. Acesse seus pedidos e dados.
            </p>
          </div>

          <form class="mt-8 space-y-5" onsubmit="event.preventDefault();">
            <div>
              <label class="label" for="email">E-mail</label>
              <input id="email" type="email" class="input" placeholder="voce@email.com" autocomplete="email" />
            </div>
            <div>
              <div class="flex items-center justify-between">
                <label class="label !mb-0" for="pwd">Senha</label>
                <a href="#" class="text-xs text-brand-400 hover:text-brand-300">Esqueci a senha</a>
              </div>
              <input id="pwd" type="password" class="input mt-2" placeholder="••••••••" autocomplete="current-password" />
            </div>

            <label class="flex items-center gap-2 text-sm text-zinc-400">
              <input type="checkbox" class="h-4 w-4 rounded border-ink-700 bg-ink-850 text-brand-500 focus:ring-brand-400" />
              Manter conectado
            </label>

            <button type="submit" class="btn-primary w-full">Entrar</button>
          </form>

          <div class="hairline my-6"></div>

          <p class="text-center text-sm text-zinc-400">
            Não tem conta?
            <a href="#" class="text-brand-400 hover:text-brand-300 font-medium">Criar agora</a>
          </p>
        </div>

        <p class="mt-6 text-center text-xs text-zinc-600">
          Ao continuar você concorda com os
          <a href="#" class="underline hover:text-zinc-400">Termos de uso</a> e a
          <a href="#" class="underline hover:text-zinc-400">Política de privacidade</a>.
        </p>
      </div>
    </main>

    <div data-footer></div>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
