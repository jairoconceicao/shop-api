openapi: 3.0.3
info:
  title: shop-api
  version: 1.0.0
  description: >
    Especificacao OpenAPI gerada a partir da secao Endpoints do README.md.
servers:
  - url: http://localhost:5000
    description: API local
tags:
  - name: Clientes
    description: Registro, atualizacao e exclusao de clientes
  - name: Produtos
    description: Consulta do catalogo e detalhe de produtos
  - name: Carrinhos
    description: Operacoes de carrinho de compras
  - name: Pedidos
    description: Criacao, consulta e cancelamento de pedidos
paths:
  /api/v1/cliente:
    post:
      tags: [Clientes]
      summary: Registro de novo cliente
      operationId: criarCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteUpsertRequest'
            example:
              cpf: '12345678901'
              nome: 'Maria Silva'
              dataNascimento: '1990-05-10'
              email: 'maria.silva@example.com'
              endereco:
                logradouro: 'Rua A'
                numero: '100'
                complemento: 'Apto 12'
                cep: '01001000'
                bairro: 'Centro'
                cidade: 'Sao Paulo'
                uf: 'SP'
              celular:
                ddd: '11'
                numero: '999999999'
                whatsApp: true
      responses:
        '201':
          description: Cliente criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteMutationResponse'
  /api/v1/cliente/{clienteId}:
    put:
      tags: [Clientes]
      summary: Atualizacao dos dados do cliente
      operationId: atualizarCliente
      parameters:
        - name: clienteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 9999
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteUpsertRequest'
            example:
              cpf: '12345678901'
              nome: 'Maria Silva'
              dataNascimento: '1990-05-10'
              email: 'maria.silva@example.com'
              endereco:
                logradouro: 'Rua A'
                numero: '100'
                complemento: 'Apto 12'
                cep: '01001000'
                bairro: 'Centro'
                cidade: 'Sao Paulo'
                uf: 'SP'
              celular:
                ddd: '11'
                numero: '999999999'
                whatsApp: true
      responses:
        '200':
          description: Cliente atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteMutationResponse'
    delete:
      tags: [Clientes]
      summary: Cancelar conta do cliente
      operationId: cancelarCliente
      parameters:
        - name: clienteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 9999
      responses:
        '200':
          description: Cliente cancelado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteMutationResponse'
  /api/v1/produto:
    get:
      tags: [Produtos]
      summary: Carregar catalogo de produtos
      operationId: listarProdutos
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
          example: 20
      responses:
        '200':
          description: Catalogo de produtos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdutoCatalogoResponse'
  /api/v1/produto/{id}:
    get:
      tags: [Produtos]
      summary: Consultar produto pelo ID
      operationId: obterProduto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 9999
      responses:
        '200':
          description: Produto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdutoDetalheResponse'
  /api/v1/carrinho/{carrinhoId}:
    get:
      tags: [Carrinhos]
      summary: Obter carrinho
      operationId: obterCarrinho
      parameters:
        - name: carrinhoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 9999
      responses:
        '200':
          description: Carrinho encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrinhoResponse'
  /api/v1/carrinho/criar:
    post:
      tags: [Carrinhos]
      summary: Criar carrinho
      operationId: criarCarrinho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarrinhoCreateRequest'
            example:
              clienteId: 99999
      responses:
        '201':
          description: Carrinho criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrinhoCreateResponse'
  /api/v1/carrinho/items:
    post:
      tags: [Carrinhos]
      summary: Adicionar item ao carrinho
      operationId: adicionarItemCarrinho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarrinhoItemCreateRequest'
            example:
              produtoId: 9999
              quantidade: 9999.9999
              valorUnitario: 9999.99
      responses:
        '201':
          description: Item adicionado ao carrinho
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrinhoItemIdResponse'
  /api/v1/carrinho/items/{itemId}:
    patch:
      tags: [Carrinhos]
      summary: Editar quantidade do item no carrinho
      operationId: atualizarItemCarrinho
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 999
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarrinhoItemUpdateRequest'
            example:
              quantidade: 4
      responses:
        '200':
          description: Item atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrinhoItemMutationResponse'
    delete:
      tags: [Carrinhos]
      summary: Excluir item do carrinho
      operationId: excluirItemCarrinho
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 999
      responses:
        '200':
          description: Item removido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrinhoItemMutationResponse'
  /api/v1/pedido:
    post:
      tags: [Pedidos]
      summary: Criar pedido
      operationId: criarPedido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PedidoCreateRequest'
            example:
              clienteId: 9999
              enderecoEntrega:
                logradouro: 'Rua A'
                numero: '100'
                complemento: 'Apto 12'
                cep: '01001000'
                bairro: 'Centro'
                cidade: 'Sao Paulo'
                uf: 'SP'
              formaPagamento: Pix
              dataPedido: '2026-06-30T12:30:00Z'
              items:
                - produtoId: 9999
                  quantidade: 2
                  valorUnitario: 9999.99
      responses:
        '201':
          description: Pedido criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoCreateResponse'
  /api/v1/pedido/{pedidoId}:
    get:
      tags: [Pedidos]
      summary: Consultar pedido
      operationId: obterPedido
      parameters:
        - name: pedidoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 9999
      responses:
        '200':
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoResponse'
    patch:
      tags: [Pedidos]
      summary: Cancelar pedido
      operationId: cancelarPedido
      parameters:
        - name: pedidoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 9999
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PedidoCancelRequest'
            example:
              status: Cancelado
      responses:
        '200':
          description: Pedido cancelado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoCancelResponse'
components:
  schemas:
    ClienteUpsertRequest:
      type: object
      required:
        - cpf
        - nome
        - dataNascimento
        - email
        - endereco
        - celular
      properties:
        cpf:
          type: string
          example: '12345678901'
        nome:
          type: string
          example: Maria Silva
        dataNascimento:
          type: string
          format: date
          example: '1990-05-10'
        email:
          type: string
          format: email
          example: maria.silva@example.com
        endereco:
          $ref: '#/components/schemas/Endereco'
        celular:
          $ref: '#/components/schemas/Celular'
    Endereco:
      type: object
      required:
        - logradouro
        - numero
        - cep
        - bairro
        - cidade
        - uf
      properties:
        logradouro:
          type: string
          example: Rua A
        numero:
          type: string
          example: '100'
        complemento:
          type: string
          example: Apto 12
        cep:
          type: string
          example: '01001000'
        bairro:
          type: string
          example: Centro
        cidade:
          type: string
          example: Sao Paulo
        uf:
          type: string
          example: SP
    Celular:
      type: object
      required:
        - ddd
        - numero
        - whatsApp
      properties:
        ddd:
          type: string
          example: '11'
        numero:
          type: string
          example: '999999999'
        whatsApp:
          type: boolean
          example: true
    ClienteIdData:
      type: object
      required: [clienteId]
      properties:
        clienteId:
          type: integer
          format: int64
          example: 9999
    ClienteMutationResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        data:
          $ref: '#/components/schemas/ClienteIdData'
    ProdutoCatalogoItem:
      type: object
      required:
        - produtoId
        - titulo
        - thumb
        - preco
        - estoque
      properties:
        produtoId:
          type: integer
          format: int64
          example: 9999
        titulo:
          type: string
          example: Camiseta Premium
        thumb:
          type: string
          example: https://example.com/thumbs/produto-9999.png
        preco:
          type: number
          example: 99.9
        estoque:
          type: number
          example: 9999.9999
    ProdutoCatalogoResponse:
      type: object
      required:
        - status
        - message
        - pagination
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        pagination:
          type: object
          required:
            - pages
            - size
            - totalItems
            - data
          properties:
            pages:
              type: integer
              example: 99
            size:
              type: integer
              example: 20
            totalItems:
              type: integer
              format: int64
              example: 99
            data:
              type: array
              items:
                $ref: '#/components/schemas/ProdutoCatalogoItem'
    ProdutoDetalheResponse:
      type: object
      required:
        - produtoId
        - titulo
        - descricao
        - modelo
        - foto
        - preco
        - estoque
      properties:
        produtoId:
          type: integer
          format: int64
          example: 9999
        titulo:
          type: string
          example: Camiseta Premium
        descricao:
          type: string
          example: Camiseta de algodao premium
        modelo:
          type: string
          example: CK-2026
        foto:
          type: string
          example: https://example.com/produtos/9999.jpg
        preco:
          type: number
          example: 99.9
        estoque:
          type: number
          example: 9999.9999
    CarrinhoCreateRequest:
      type: object
      required: [clienteId]
      properties:
        clienteId:
          type: integer
          format: int64
          example: 99999
    CarrinhoCreateResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        data:
          type: object
          required:
            - carrinhoId
            - dataCarrinho
          properties:
            carrinhoId:
              type: integer
              format: int64
              example: 9999
            dataCarrinho:
              type: string
              format: date-time
              example: '2026-06-30T12:30:00Z'
    CarrinhoItemResponse:
      type: object
      required:
        - itemId
        - produtoId
        - quantidade
        - valorUnitario
      properties:
        itemId:
          type: integer
          format: int64
          example: 9999
        produtoId:
          type: integer
          format: int64
          example: 9999
        quantidade:
          type: number
          example: 2
        valorUnitario:
          type: number
          example: 99.99
    CarrinhoResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        data:
          type: object
          required:
            - clienteId
            - carrinhoId
            - dataCarrinho
            - items
          properties:
            clienteId:
              type: integer
              format: int64
              example: 99999
            carrinhoId:
              type: integer
              format: int64
              example: 9999
            dataCarrinho:
              type: string
              format: date-time
              example: '2026-07-01T14:30:00-03:00'
            items:
              type: array
              items:
                $ref: '#/components/schemas/CarrinhoItemResponse'
    CarrinhoItemCreateRequest:
      type: object
      required:
        - produtoId
        - quantidade
        - valorUnitario
      properties:
        produtoId:
          type: integer
          format: int64
          example: 9999
        quantidade:
          type: number
          example: 9999.9999
        valorUnitario:
          type: number
          example: 9999.99
    CarrinhoItemUpdateRequest:
      type: object
      required: [quantidade]
      properties:
        quantidade:
          type: number
          example: 4
    CarrinhoItemIdResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        data:
          type: object
          required: [itemId]
          properties:
            itemId:
              type: integer
              format: int64
              example: 999
    CarrinhoItemMutationResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        data:
          type: object
          required:
            - itemId
            - produtoId
          properties:
            itemId:
              type: integer
              format: int64
              example: 9999
            produtoId:
              type: integer
              format: int64
              example: 9999
    PedidoItemRequest:
      type: object
      required:
        - produtoId
        - quantidade
        - valorUnitario
      properties:
        produtoId:
          type: integer
          format: int64
          example: 9999
        quantidade:
          type: number
          example: 9999.9999
        valorUnitario:
          type: number
          example: 9999.99
    FormaPagamento:
      type: string
      enum:
        - Pix
        - Cartao
        - Boleto
      example: Pix
    PedidoCreateRequest:
      type: object
      required:
        - clienteId
        - enderecoEntrega
        - formaPagamento
        - dataPedido
        - items
      properties:
        clienteId:
          type: integer
          format: int64
          example: 9999
        enderecoEntrega:
          $ref: '#/components/schemas/Endereco'
        formaPagamento:
          $ref: '#/components/schemas/FormaPagamento'
        dataPedido:
          type: string
          format: date-time
          example: '2026-06-30T12:30:00Z'
        items:
          type: array
          items:
            $ref: '#/components/schemas/PedidoItemRequest'
    PedidoIdData:
      type: object
      required: [pedidoId]
      properties:
        pedidoId:
          type: integer
          format: int64
          example: 9999
    PedidoCreateResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        data:
          $ref: '#/components/schemas/PedidoIdData'
    PedidoCliente:
      type: object
      required:
        - cpf
        - nome
        - email
      properties:
        cpf:
          type: string
          example: '12345678901'
        nome:
          type: string
          example: Maria Silva
        email:
          type: string
          format: email
          example: maria.silva@example.com
    PedidoItemResponse:
      type: object
      required:
        - produtoId
        - quantidade
        - valorUnitario
      properties:
        produtoId:
          type: integer
          format: int64
          example: 9999
        quantidade:
          type: number
          example: 2
        valorUnitario:
          type: number
          example: 99.9
    PedidoStatus:
      type: string
      enum:
        - Criado
        - EmProcessamento
        - Processado
        - Cancelado
        - Devolvido
      example: Criado
    PedidoResponse:
      type: object
      required:
        - id
        - cliente
        - enderecoEntrega
        - formaPagamento
        - dataPedido
        - status
        - items
      properties:
        id:
          type: integer
          format: int64
          example: 9999
        cliente:
          $ref: '#/components/schemas/PedidoCliente'
        enderecoEntrega:
          $ref: '#/components/schemas/Endereco'
        formaPagamento:
          $ref: '#/components/schemas/FormaPagamento'
        dataPedido:
          type: string
          format: date-time
          example: '2026-06-30T12:30:00Z'
        status:
          $ref: '#/components/schemas/PedidoStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/PedidoItemResponse'
    PedidoCancelRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Cancelado]
          example: Cancelado
    PedidoCancelResponse:
      type: object
      required:
        - status
        - message
        - pedidoId
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        pedidoId:
          type: integer
          format: int64
          example: 9999
